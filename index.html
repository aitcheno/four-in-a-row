<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Four In A Row: Pop Out</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Four In A Row: <span>Pop Out</span></h1>

  <div class="turn-indicator">
    <div class="turn-coin pixel-coin" id="turn-coin"></div>
    <p id="turn-text">Player 1's turn</p>
  </div>

  <div class="board-wrapper">
    <div class="preview-coin" id="preview-coin"></div>
    <div class="board" id="board"></div>

    <div id="winner-banner" class="winner-banner hidden">
      <p id="winner-text"></p>
      <button id="restart-btn">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
